          <p>Bridging compassion and clinical excellence to integrate behavioral health into every stage of care.</p>
          <p>Soul Tide Therapy was founded with a mission to bridge the gap between traditional psychotherapy and integrated healthcare systems. We believe healing is not simply the absence of illness, but the presence of connection, dignity, and purpose.</p>
          <h3>Compassionate & Structured</h3>
          <p>We combine empathy with evidence-based approaches to create meaningful therapeutic outcomes.</p>
          <h3>Integrated Care</h3>
          <p>Behavioral health support seamlessly woven into medical and post-acute care systems.</p>

          <p>Meeting clients where they are in their journey, with individualized care plans designed for their unique needs.</p>

          <h2>Our Services</h2>
          <p>Comprehensive mental health support tailored to meet you where you are.</p>
          <h3>Facility-Based Behavioral Health</h3>
          <p>Delivering in-facility psychotherapy that enhances residents' quality of life and proactively reduces rehospitalization rates through early intervention and coordinated care.</p>
          <h3>Outpatient Clinical Services</h3>
          <p>In partnership with Dr. Jeffrey Raunig in Carlsbad, providing individualized, evidence-based care for clients of all ages seeking emotional balance and personal growth.</p>
          <h3>Telehealth Therapy</h3>
          <p>Offering accessible, HIPAA-compliant virtual care across California, ensuring clients receive consistent, compassionate support wherever they are.</p>
          <h3>EMDR Therapy</h3>
          <p>Eye Movement Desensitization and Reprocessing — an evidence-based therapy that helps the brain process difficult memories so they no longer carry the same emotional intensity.</p>
